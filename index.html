<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>翻訳アプリ モックアップ</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  html,body {
    width:100%; height:100%;
    background:#0b0b0d;
    display:flex; align-items:center; justify-content:center;
    font-family:-apple-system, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
  }

  /* ---- iPhone frame ---- */
  .phone {
    position:relative;
    width:390px; height:844px;
    background:#000;
    border-radius:55px;
    padding:14px;
    box-shadow:0 0 0 2px #2a2a2a, 0 20px 60px rgba(0,0,0,0.6);
  }
  .screen {
    position:relative;
    width:100%; height:100%;
    background:linear-gradient(180deg,#1c1c1e 0%, #000 100%);
    border-radius:42px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .navbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px 14px 18px;
    padding-top:max(50px, calc(env(safe-area-inset-top) + 10px));
    color:#fff;
  }
  .navbar .title { font-size:17px; font-weight:600; }
  .navbar .icon-btn {
    width:30px; height:30px;
    display:flex; align-items:center; justify-content:center;
    color:#0a84ff;
  }

  .lang-row {
    display:flex; align-items:center; justify-content:center;
    gap:14px;
    padding:4px 0 18px 0;
    font-size:13px;
    font-weight:600;
  }
  .lang-row .arrow { color:#48484a; font-size:13px; }
  .lang-row .lang-pill {
    background:#1c1c1e;
    border:1px solid #2c2c2e;
    color:#e5e5ea;
    padding:5px 12px;
    border-radius:20px;
  }

  .content {
    flex:1;
    display:flex;
    flex-direction:column;
    padding:0 16px;
    gap:12px;
  }

  .card {
    background:#1c1c1e;
    border-radius:20px;
    padding:20px 20px;
    position:relative;
    min-height:96px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }
  .card .lang-label {
    font-size:12px;
    font-weight:700;
    letter-spacing:0.5px;
    color:#636366;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  .card .text {
    color:#fff;
    font-size:21px;
    line-height:1.45;
    font-weight:500;
    transition:opacity .18s ease, transform .18s ease;
  }
  .card.result { background:linear-gradient(135deg,#103a73,#0a2d57); }
  .card.result .lang-label { color:#7fb8ff; }
  .card .speaker {
    position:absolute;
    top:18px; right:18px;
    width:26px; height:26px;
    color:#636366;
  }
  .card.result .speaker { color:#7fb8ff; }

  .placeholder { color:#48484a; font-size:15px; font-weight:500; }

  .rec-cursor {
    display:inline-block;
    color:#ff453a;
    font-weight:400;
    margin-left:1px;
    animation:blink 0.9s steps(1) infinite;
  }
  .listening-tag {
    display:inline-flex; align-items:center; gap:6px;
    font-size:11px; font-weight:700; color:#ff453a;
    margin-top:10px; letter-spacing:0.3px;
  }
  .listening-tag .dot {
    width:7px; height:7px; background:#ff453a; border-radius:50%;
    animation:blink 1.1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  .detecting-tag { display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:#8e8e93; }
  .lang-pill.detecting { color:#8e8e93; display:inline-flex; align-items:center; gap:6px; }
  .lang-pill .mini-spinner {
    width:10px; height:10px;
    border:1.6px solid rgba(142,142,147,0.3);
    border-top-color:#8e8e93;
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  .lang-pill.confirmed { color:#0a84ff; border-color:#0a3a66; background:#102338; }

  .translating-tag { display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:#7fb8ff; }
  .spinner {
    width:14px; height:14px;
    border:2px solid rgba(127,184,255,0.25);
    border-top-color:#7fb8ff;
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* 隠しボタン(日本語訳カード下) */
  #hiddenTrigger {
    width:100%; height:48px;
    background:transparent; border:none; padding:0; margin:0;
    -webkit-tap-highlight-color:transparent; cursor:pointer;
  }

  /* ---- mic area ---- */
  .mic-area {
    padding:14px 22px 30px 22px;
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  .wave-wrap { width:100%; height:64px; display:flex; align-items:center; justify-content:center; }
  canvas#wave { width:100%; height:64px; }
  .mic-status {
    font-size:11px; font-weight:700; letter-spacing:0.4px;
    color:#636366; height:14px; visibility:hidden;
  }
  .mic-status.live { color:#ff453a; }
  .mic-btn {
    width:64px; height:64px; border-radius:50%;
    background:linear-gradient(135deg,#3a3a3c,#1c1c1e);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 18px rgba(0,0,0,0.4);
    border:none; cursor:pointer;
    transition:background .25s ease, box-shadow .25s ease;
  }
  .mic-btn.active { background:linear-gradient(135deg,#ff453a,#d70015); box-shadow:0 4px 18px rgba(255,69,58,0.45); }
  .mic-btn svg { width:26px; height:26px; color:#fff; }
  .home-indicator { width:134px; height:5px; background:#fff; border-radius:3px; opacity:0.85; margin:6px auto 4px auto; }

  /* ---- start button ---- */
  .start-bar { padding:0 16px 12px 16px; }
  .start-btn {
    width:100%; background:#0a84ff; color:#fff;
    border:none; border-radius:14px; padding:13px 0;
    font-size:15px; font-weight:700; letter-spacing:0.3px;
    cursor:pointer; transition:opacity .2s ease;
  }
  .start-btn:active { opacity:0.7; }
  .start-btn:disabled { opacity:0.4; cursor:default; }

  /* ======================================
     コントロールパネル(画面外オーバーレイ)
     ====================================== */
  #cpOverlay {
    position:fixed; inset:0;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(4px);
    z-index:200;
    display:none;
    align-items:flex-end;
    justify-content:center;
  }
  #cpOverlay.open { display:flex; }

  #cpPanel {
    background:#1c1c1e;
    border-radius:20px 20px 0 0;
    padding:20px 22px 40px 22px;
    width:100%;
    max-width:430px;
    transform:translateY(100%);
    transition:transform .35s cubic-bezier(.32,1,.23,1);
  }
  #cpOverlay.open #cpPanel { transform:translateY(0); }

  .cp-handle {
    width:36px; height:4px; background:#48484a; border-radius:2px;
    margin:0 auto 18px auto;
  }
  .cp-title {
    font-size:13px; font-weight:700; color:#8e8e93;
    letter-spacing:0.5px; text-transform:uppercase;
    margin-bottom:16px;
  }

  /* セクション */
  .cp-section { margin-bottom:20px; }
  .cp-section-label {
    font-size:11px; font-weight:700; color:#636366;
    letter-spacing:0.5px; text-transform:uppercase;
    margin-bottom:10px;
  }

  /* 言語切替 */
  .cp-lang-btns { display:flex; gap:10px; }
  .cp-lang-btn {
    flex:1; padding:10px 0; border-radius:12px;
    background:#2c2c2e; border:2px solid transparent;
    color:#e5e5ea; font-size:14px; font-weight:600;
    cursor:pointer; transition:all .2s;
    display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  .cp-lang-btn .sub { font-size:10px; color:#8e8e93; font-weight:500; }
  .cp-lang-btn.active { border-color:#0a84ff; background:#102338; color:#0a84ff; }
  .cp-lang-btn.active .sub { color:#7fb8ff; }

  /* ローディング時間スライダー */
  .cp-slider-row {
    display:flex; align-items:center; gap:12px;
  }
  .cp-slider {
    flex:1;
    -webkit-appearance:none; appearance:none;
    height:4px; border-radius:2px;
    background:#3a3a3c;
    outline:none;
  }
  .cp-slider::-webkit-slider-thumb {
    -webkit-appearance:none;
    width:22px; height:22px;
    border-radius:50%; background:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,0.4);
    cursor:pointer;
  }
  .cp-slider-val {
    font-size:13px; font-weight:700; color:#e5e5ea;
    min-width:36px; text-align:right;
  }

  /* キーボード操作ガイド */
  .cp-keys { display:flex; flex-direction:column; gap:8px; }
  .cp-key-row {
    display:flex; align-items:center; justify-content:space-between;
    background:#2c2c2e; border-radius:10px; padding:10px 14px;
  }
  .cp-key-desc { font-size:13px; color:#e5e5ea; font-weight:500; }
  .kbd {
    display:inline-flex; align-items:center; justify-content:center;
    background:#3a3a3c; border:1px solid #555;
    border-radius:6px; padding:2px 8px;
    font-size:12px; font-weight:700; color:#e5e5ea;
    min-width:28px;
  }
  .cp-close-btn {
    width:100%; margin-top:16px; padding:13px 0;
    background:#2c2c2e; border:none; border-radius:14px;
    color:#e5e5ea; font-size:15px; font-weight:700;
    cursor:pointer;
  }
</style>
</head>
<body>

<!-- ======= コントロールパネル(モーダル) ======= -->
<div id="cpOverlay">
  <div id="cpPanel">
    <div class="cp-handle"></div>
    <div class="cp-title">コントロールパネル</div>

    <div class="cp-section">
      <div class="cp-section-label">🌐 言語</div>
      <div class="cp-lang-btns">
        <button class="cp-lang-btn active" id="btnLangHi" onclick="setLang('hi')">
          ヒンディー語<span class="sub">Hindi</span>
        </button>
        <button class="cp-lang-btn" id="btnLangTw" onclick="setLang('tw')">
          トゥイ語<span class="sub">Twi</span>
        </button>
      </div>
    </div>

    <div class="cp-section">
      <div class="cp-section-label">⏱ 言語検出の時間</div>
      <div class="cp-slider-row">
        <input type="range" class="cp-slider" id="sliderDetect" min="300" max="4000" step="100" value="1200">
        <div class="cp-slider-val" id="valDetect">1.2s</div>
      </div>
    </div>

    <div class="cp-section">
      <div class="cp-section-label">⏱ 音声認識(入力表示)の時間</div>
      <div class="cp-slider-row">
        <input type="range" class="cp-slider" id="sliderType" min="500" max="8000" step="100" value="4000">
        <div class="cp-slider-val" id="valType">4.0s</div>
      </div>
    </div>

    <div class="cp-section">
      <div class="cp-section-label">⏱ 翻訳ローディングの時間</div>
      <div class="cp-slider-row">
        <input type="range" class="cp-slider" id="sliderTranslate" min="200" max="5000" step="100" value="1000">
        <div class="cp-slider-val" id="valTranslate">1.0s</div>
      </div>
    </div>

    <div class="cp-section">
      <div class="cp-section-label">⌨ キーボード操作</div>
      <div class="cp-keys">
        <div class="cp-key-row">
          <div class="cp-key-desc">翻訳スタート(フレーズ①)</div>
          <span class="kbd">Space</span>
        </div>
        <div class="cp-key-row">
          <div class="cp-key-desc">翻訳スタート(フレーズ②)</div>
          <span class="kbd">H</span>
        </div>
        <div class="cp-key-row">
          <div class="cp-key-desc">次のステージへスキップ</div>
          <span class="kbd">→</span>
        </div>
        <div class="cp-key-row">
          <div class="cp-key-desc">リセット</div>
          <span class="kbd">R</span>
        </div>
        <div class="cp-key-row">
          <div class="cp-key-desc">パネルを開く/閉じる</div>
          <span class="kbd">P</span>
        </div>
      </div>
    </div>

    <button class="cp-close-btn" onclick="closePanel()">閉じる</button>
  </div>
</div>

<!-- ======= iPhone ======= -->
<div class="phone">
  <div class="screen">

    <div class="navbar">
      <div class="icon-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M15 5L8 12L15 19" stroke="#0a84ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="title">翻訳</div>
      <div class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="2" fill="#0a84ff"/><circle cx="12" cy="12" r="2" fill="#0a84ff"/><circle cx="19" cy="12" r="2" fill="#0a84ff"/></svg>
      </div>
    </div>

    <div class="lang-row">
      <div class="lang-pill" id="langPillSource">言語を自動検出</div>
      <div class="arrow">⇄</div>
      <div class="lang-pill">日本語</div>
    </div>

    <div class="start-bar">
      <button class="start-btn" id="startBtn">▶ 翻訳をスタート</button>
    </div>

    <div class="content">

      <div class="card source">
        <div class="speaker">
          <svg viewBox="0 0 24 24" fill="none"><path d="M11 5L6 9H3V15H6L11 19V5Z" fill="currentColor"/><path d="M15.5 8.5C16.5 9.5 17 10.7 17 12C17 13.3 16.5 14.5 15.5 15.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
        <div class="lang-label" id="sourceLangLabel">言語検出中</div>
        <div class="text" id="sourceText"><span class="placeholder">「翻訳をスタート」を押してください</span></div>
        <div class="listening-tag" id="recordedTag" style="display:none;"><span class="dot"></span>RECORDED</div>
      </div>

      <div class="card result">
        <div class="speaker">
          <svg viewBox="0 0 24 24" fill="none"><path d="M11 5L6 9H3V15H6L11 19V5Z" fill="currentColor"/><path d="M15.5 8.5C16.5 9.5 17 10.7 17 12C17 13.3 16.5 14.5 15.5 15.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
        <div class="lang-label">日本語 (翻訳)</div>
        <div class="text" id="resultText"><span class="placeholder">―</span></div>
      </div>

      <!-- 隠しボタン(日本語訳カード下) -->
      <button id="hiddenTrigger" aria-hidden="true"></button>

    </div>

    <div class="mic-area">
      <div class="wave-wrap"><canvas id="wave"></canvas></div>
      <div class="mic-status" id="micStatus">マイク未使用</div>
      <button class="mic-btn" id="micBtn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 14C13.66 14 15 12.66 15 11V5C15 3.34 13.66 2 12 2C10.34 2 9 3.34 9 5V11C9 12.66 10.34 14 12 14Z" fill="currentColor"/><path d="M17 11C17 13.76 14.76 16 12 16C9.24 16 7 13.76 7 11H5C5 14.53 7.61 17.43 11 17.92V21H13V17.92C16.39 17.43 19 14.53 19 11H17Z" fill="currentColor"/></svg>
      </button>
      <div class="home-indicator"></div>
    </div>

  </div>
</div>

<script>
/* =========================================================
   フレーズデータ
   ========================================================= */
const PHRASES = {
  hi: {
    langLabel: 'ヒンディー語',
    p1: { src: 'वे बेरहमी से लोगों को मार डालते हैं।', ja: 'あいつら平気で人を殺す。' },
    p2: { src: 'वह लोगों को नर्क में ले जाता है।',     ja: '人を地獄に連れていく。' },
  },
  tw: {
    langLabel: 'トゥイ語',
    p1: { src: 'wokum nnipa a ɛnyɛ den.',   ja: 'あいつら平気で人を殺す。' },
    p2: { src: 'wɔde nnipa kɔ hell.',        ja: '人を地獄に連れていく。' },
  },
};

let currentLang = 'hi';

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btnLangHi').classList.toggle('active', lang === 'hi');
  document.getElementById('btnLangTw').classList.toggle('active', lang === 'tw');
}

/* =========================================================
   コントロールパネル
   ========================================================= */
const cpOverlay = document.getElementById('cpOverlay');

function openPanel()  { cpOverlay.classList.add('open'); }
function closePanel() { cpOverlay.classList.remove('open'); }

cpOverlay.addEventListener('click', e => { if (e.target === cpOverlay) closePanel(); });

// スライダー
function setupSlider(sliderId, valId, divisor) {
  const sl = document.getElementById(sliderId);
  const vl = document.getElementById(valId);
  const update = () => { vl.textContent = (sl.value / 1000).toFixed(1) + 's'; };
  sl.addEventListener('input', update);
  update();
}
setupSlider('sliderDetect',    'valDetect',    1000);
setupSlider('sliderType',      'valType',      1000);
setupSlider('sliderTranslate', 'valTranslate', 1000);

function getDurations() {
  return {
    detect:    parseInt(document.getElementById('sliderDetect').value),
    type:      parseInt(document.getElementById('sliderType').value),
    translate: parseInt(document.getElementById('sliderTranslate').value),
  };
}

/* =========================================================
   翻訳フロー
   ========================================================= */
const startBtn       = document.getElementById('startBtn');
const sourceText     = document.getElementById('sourceText');
const resultText     = document.getElementById('resultText');
const recordedTag    = document.getElementById('recordedTag');
const langPillSource = document.getElementById('langPillSource');
const sourceLangLabel= document.getElementById('sourceLangLabel');
const hiddenTrigger  = document.getElementById('hiddenTrigger');

const CURSOR = '<span class="rec-cursor">|</span>';
let activeTimers = [];
let stage = 0; // 0=idle 1=detecting 2=typing 3=translating 4=done

function clearAllTimers() {
  activeTimers.forEach(t => { clearTimeout(t); clearInterval(t); });
  activeTimers = [];
}

function setCardText(el, html) {
  el.style.opacity = 0;
  el.style.transform = 'translateY(4px)';
  const t = setTimeout(() => {
    el.innerHTML = html;
    el.style.opacity = 1;
    el.style.transform = 'translateY(0)';
  }, 180);
  activeTimers.push(t);
}

let typeInterval = null;
function typeWords(el, fullText, totalDurationMs, onDone) {
  if (typeInterval) clearInterval(typeInterval);
  const words = fullText.split(' ');
  let i = 0;
  const interval = totalDurationMs / words.length;
  el.style.opacity = 1;
  el.style.transform = 'translateY(0)';
  el.innerHTML = CURSOR;

  typeInterval = setInterval(() => {
    i++;
    el.innerHTML = words.slice(0, i).join(' ') + CURSOR;
    if (i >= words.length) {
      clearInterval(typeInterval);
      const t = setTimeout(() => { el.innerHTML = fullText; if(onDone) onDone(); }, 250);
      activeTimers.push(t);
    }
  }, interval);
  activeTimers.push(typeInterval);
}

function resetUI() {
  stage = 0;
  recordedTag.style.display = 'none';
  resultText.style.opacity = 1;
  resultText.style.transform = 'translateY(0)';
  resultText.innerHTML = '<span class="placeholder">―</span>';
  sourceText.innerHTML = '';
  sourceLangLabel.textContent = '言語検出中';
  langPillSource.classList.remove('confirmed');
  langPillSource.innerHTML = '言語を自動検出';
}

// 現在のステージを記憶して途中スキップできるよう、フローをステップ関数として定義
let pendingPhrase = null; // {src, ja, langLabel}

function goStage1(phrase) {
  pendingPhrase = phrase;
  clearAllTimers();
  resetUI();
  stage = 1;
  startBtn.disabled = true;
  startBtn.textContent = '言語を認識中...';
  langPillSource.classList.add('detecting');
  langPillSource.innerHTML = '<span class="mini-spinner"></span>言語を検出中…';

  const { detect } = getDurations();
  activeTimers.push(setTimeout(() => goStage2(), detect));
}

function goStage2() {
  if (!pendingPhrase) return;
  clearAllTimers();
  stage = 2;
  const { langLabel, src } = pendingPhrase;
  langPillSource.classList.remove('detecting');
  langPillSource.classList.add('confirmed');
  langPillSource.textContent = langLabel;
  sourceLangLabel.textContent = langLabel;
  startBtn.textContent = '認識中...';

  const { type } = getDurations();
  activeTimers.push(setTimeout(() => {
    typeWords(sourceText, src, type, () => goStage3());
  }, 200));
}

function goStage3() {
  if (!pendingPhrase) return;
  clearAllTimers();
  stage = 3;
  recordedTag.style.display = 'inline-flex';
  startBtn.textContent = '翻訳中...';
  setCardText(resultText, '<span class="translating-tag"><span class="spinner"></span>翻訳中…</span>');

  const { translate } = getDurations();
  activeTimers.push(setTimeout(() => goStage4(), translate));
}

function goStage4() {
  if (!pendingPhrase) return;
  clearAllTimers();
  stage = 4;
  setCardText(resultText, pendingPhrase.ja);
  startBtn.disabled = false;
  startBtn.textContent = '▶ 翻訳をスタート';
}

// キーボードの→でステージをスキップ
function skipToNextStage() {
  if (stage === 0) return;
  if (stage === 1) { goStage2(); return; }
  if (stage === 2) { goStage3(); return; }
  if (stage === 3) { goStage4(); return; }
}

/* ボタンイベント */
startBtn.addEventListener('click', () => {
  const p = PHRASES[currentLang];
  goStage1({ ...p.p1, langLabel: p.langLabel });
});

hiddenTrigger.addEventListener('click', () => {
  openPanel();
});

/* =========================================================
   キーボード操作
   ========================================================= */
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;

  if (e.code === 'Space') {
    e.preventDefault();
    const p = PHRASES[currentLang];
    goStage1({ ...p.p1, langLabel: p.langLabel });
  }
  if (e.code === 'KeyH') {
    const p = PHRASES[currentLang];
    goStage1({ ...p.p2, langLabel: p.langLabel });
  }
  if (e.code === 'ArrowRight') { e.preventDefault(); skipToNextStage(); }
  if (e.code === 'KeyR') { clearAllTimers(); resetUI(); startBtn.disabled = false; startBtn.textContent = '▶ 翻訳をスタート'; }
  if (e.code === 'KeyP') { cpOverlay.classList.contains('open') ? closePanel() : openPanel(); }
});

/* =========================================================
   波形(実マイク / Web Audio API)
   ========================================================= */
const canvas  = document.getElementById('wave');
const ctx     = canvas.getContext('2d');
const micBtn  = document.getElementById('micBtn');
const micStatus = document.getElementById('micStatus');

let audioCtx, analyser, dataArray, source, stream;
let micActive = false;
const BAR_COUNT = 46;
let bars = new Array(BAR_COUNT).fill(0.08);

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width  = rect.width  * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width  = rect.width  + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
resize();
window.addEventListener('resize', resize);

async function startMic() {
  try {
    stream   = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.75;
    source   = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    micActive = true;
    micBtn.classList.add('active');
    micStatus.textContent = 'マイク入力中(現場音声)';
    micStatus.classList.add('live');
  } catch(err) {
    micStatus.textContent = 'マイクへのアクセスが許可されませんでした';
    console.error(err);
  }
}

function stopMic() {
  if (stream)   stream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  micActive = false;
  micBtn.classList.remove('active');
  micStatus.textContent = 'マイク未使用';
  micStatus.classList.remove('live');
}

micBtn.addEventListener('click', () => { micActive ? stopMic() : startMic(); });

function render() {
  const w = canvas.width  / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  if (micActive && analyser) {
    analyser.getByteFrequencyData(dataArray);
    const step = Math.floor(dataArray.length / BAR_COUNT);
    for (let i = 0; i < BAR_COUNT; i++) {
      let sum = 0;
      for (let j = 0; j < step; j++) sum += dataArray[i*step+j];
      const target = Math.max(0.06, Math.min(1, (sum/step/255) * 1.6));
      bars[i] += (target - bars[i]) * 0.45;
    }
  } else {
    for (let i = 0; i < BAR_COUNT; i++) {
      bars[i] += (Math.random()-0.5) * 0.04;
      bars[i] = Math.max(0.06, Math.min(0.18, bars[i]));
    }
  }

  const gap = 3.2;
  const barWidth = (w - gap*(BAR_COUNT-1)) / BAR_COUNT;
  for (let i = 0; i < BAR_COUNT; i++) {
    const barH = h*0.12 + bars[i]*h*0.8;
    const x = i*(barWidth+gap), y = (h-barH)/2;
    const grad = ctx.createLinearGradient(0,y,0,y+barH);
    if (micActive) { grad.addColorStop(0,'#ff6b5e'); grad.addColorStop(1,'#ff453a'); }
    else           { grad.addColorStop(0,'#48484a'); grad.addColorStop(1,'#3a3a3c'); }
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, barWidth, barH, barWidth/2);
    ctx.fill();
  }
  requestAnimationFrame(render);
}
render();
</script>
