<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>翻訳アプリ モックアップ</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  html,body {
    width:100%; height:100%;
    background:#0b0b0d;
    display:flex; align-items:center; justify-content:center;
    font-family:-apple-system, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
  }

  .phone {
    position:relative;
    width:390px; height:844px;
    background:#000;
    border-radius:55px;
    padding:14px;
    box-shadow:0 0 0 2px #2a2a2a, 0 20px 60px rgba(0,0,0,0.6);
  }
  .screen {
    position:relative;
    width:100%; height:100%;
    background:linear-gradient(180deg,#1c1c1e 0%, #000 100%);
    border-radius:42px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .island {
    position:absolute;
    top:14px; left:50%; transform:translateX(-50%);
    width:120px; height:34px;
    background:#000;
    border-radius:20px;
    z-index:50;
  }
  .statusbar {
    height:54px;
    display:flex; align-items:flex-end; justify-content:space-between;
    padding:0 28px 8px 28px;
    color:#fff;
    font-size:15px;
    font-weight:600;
    letter-spacing:0.3px;
  }
  .statusbar .icons { display:flex; align-items:center; gap:6px; }
  .statusbar svg { display:block; }

  .navbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 18px 14px 18px;
    color:#fff;
  }
  .navbar .title { font-size:17px; font-weight:600; }
  .navbar .icon-btn {
    width:30px; height:30px;
    display:flex; align-items:center; justify-content:center;
    color:#0a84ff;
  }

  .lang-row {
    display:flex; align-items:center; justify-content:center;
    gap:14px;
    padding:4px 0 18px 0;
    color:#8e8e93;
    font-size:13px;
    font-weight:600;
  }
  .lang-row .arrow { color:#48484a; font-size:13px; }
  .lang-row .lang-pill {
    background:#1c1c1e;
    border:1px solid #2c2c2e;
    color:#e5e5ea;
    padding:5px 12px;
    border-radius:20px;
  }

  .content {
    flex:1;
    display:flex;
    flex-direction:column;
    padding:0 16px;
    gap:12px;
  }

  .card {
    background:#1c1c1e;
    border-radius:20px;
    padding:20px 20px;
    position:relative;
    min-height:96px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }
  .card .lang-label {
    font-size:12px;
    font-weight:700;
    letter-spacing:0.5px;
    color:#636366;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  .card .text {
    color:#fff;
    font-size:21px;
    line-height:1.45;
    font-weight:500;
    transition:opacity .18s ease, transform .18s ease;
  }
  .card.result {
    background:linear-gradient(135deg,#103a73,#0a2d57);
  }
  .card.result .lang-label { color:#7fb8ff; }
  .card .speaker {
    position:absolute;
    top:18px; right:18px;
    width:26px; height:26px;
    color:#636366;
  }
  .card.result .speaker { color:#7fb8ff; }

  .placeholder {
    color:#48484a;
    font-size:15px;
    font-weight:500;
  }

  .rec-cursor {
    display:inline-block;
    color:#ff453a;
    font-weight:400;
    margin-left:1px;
    animation:blink 0.9s steps(1) infinite;
  }

  .listening-tag {
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    font-weight:700;
    color:#ff453a;
    margin-top:10px;
    letter-spacing:0.3px;
  }
  .listening-tag .dot {
    width:7px; height:7px;
    background:#ff453a;
    border-radius:50%;
    animation:blink 1.1s infinite;
  }
  @keyframes blink {
    0%,100% { opacity:1; } 50% { opacity:0.25; }
  }

  .translating-tag {
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    font-weight:600;
    color:#7fb8ff;
  }
  .spinner {
    width:14px; height:14px;
    border:2px solid rgba(127,184,255,0.25);
    border-top-color:#7fb8ff;
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .mic-area {
    padding:14px 22px 30px 22px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
  }
  .wave-wrap {
    width:100%;
    height:64px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  canvas#wave {
    width:100%;
    height:64px;
  }
  .mic-status {
    font-size:11px;
    font-weight:700;
    letter-spacing:0.4px;
    color:#636366;
    height:14px;
  }
  .mic-status.live { color:#ff453a; }

  .mic-btn {
    width:64px; height:64px;
    border-radius:50%;
    background:linear-gradient(135deg,#3a3a3c,#1c1c1e);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 18px rgba(0,0,0,0.4);
    border:none;
    cursor:pointer;
    transition:background .25s ease, box-shadow .25s ease;
  }
  .mic-btn.active {
    background:linear-gradient(135deg,#ff453a,#d70015);
    box-shadow:0 4px 18px rgba(255,69,58,0.45);
  }
  .mic-btn svg { width:26px; height:26px; color:#fff; }

  .home-indicator {
    width:134px; height:5px;
    background:#fff;
    border-radius:3px;
    opacity:0.85;
    margin:6px auto 4px auto;
  }

  .start-bar {
    padding:0 16px 12px 16px;
  }
  .start-btn {
    width:100%;
    background:#0a84ff;
    color:#fff;
    border:none;
    border-radius:14px;
    padding:13px 0;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.3px;
    cursor:pointer;
    transition:opacity .2s ease;
  }
  .start-btn:active { opacity:0.7; }
  .start-btn:disabled { opacity:0.4; cursor:default; }
</style>
</head>
<body>

<div class="phone">
  <div class="screen">
    <div class="island"></div>

    <div class="statusbar">
      <div class="time">9:41</div>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="6" width="3" height="6" rx="0.5" fill="white"/><rect x="5" y="4" width="3" height="8" rx="0.5" fill="white"/><rect x="10" y="2" width="3" height="10" rx="0.5" fill="white"/><rect x="15" y="0" width="3" height="12" rx="0.5" fill="white"/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 2.2C11.2 2.2 13.6 3.3 15.4 5.1L16.6 3.9C14.4 1.7 11.6 0.4 8.5 0.4C5.4 0.4 2.6 1.7 0.4 3.9L1.6 5.1C3.4 3.3 5.8 2.2 8.5 2.2Z" fill="white"/><path d="M8.5 5.6C10.1 5.6 11.6 6.2 12.7 7.3L11.5 8.5C10.7 7.7 9.6 7.2 8.5 7.2C7.4 7.2 6.3 7.7 5.5 8.5L4.3 7.3C5.4 6.2 6.9 5.6 8.5 5.6Z" fill="white"/><circle cx="8.5" cy="10.3" r="1.4" fill="white"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="white"/><rect x="2" y="2" width="18" height="8" rx="1.3" fill="white"/><rect x="22.5" y="4" width="1.6" height="4" rx="0.8" fill="white"/></svg>
      </div>
    </div>

    <div class="navbar">
      <div class="icon-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M15 5L8 12L15 19" stroke="#0a84ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="title">翻訳</div>
      <div class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="2" fill="#0a84ff"/><circle cx="12" cy="12" r="2" fill="#0a84ff"/><circle cx="19" cy="12" r="2" fill="#0a84ff"/></svg>
      </div>
    </div>

    <div class="lang-row">
      <div class="lang-pill">ベトナム語</div>
      <div class="arrow">⇄</div>
      <div class="lang-pill">日本語</div>
    </div>

    <div class="start-bar">
      <button class="start-btn" id="startBtn">▶ 翻訳をスタート</button>
    </div>

    <div class="content">

      <div class="card source" id="sourceCard">
        <div class="speaker">
          <svg viewBox="0 0 24 24" fill="none"><path d="M11 5L6 9H3V15H6L11 19V5Z" fill="currentColor"/><path d="M15.5 8.5C16.5 9.5 17 10.7 17 12C17 13.3 16.5 14.5 15.5 15.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
        <div class="lang-label">ベトナム語</div>
        <div class="text" id="sourceText"><span class="placeholder">「翻訳をスタート」を押してください</span></div>
        <div class="listening-tag" id="recordedTag" style="display:none;"><span class="dot"></span>RECORDED</div>
      </div>

      <div class="card result" id="resultCard">
        <div class="speaker">
          <svg viewBox="0 0 24 24" fill="none"><path d="M11 5L6 9H3V15H6L11 19V5Z" fill="currentColor"/><path d="M15.5 8.5C16.5 9.5 17 10.7 17 12C17 13.3 16.5 14.5 15.5 15.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
        <div class="lang-label">日本語 (翻訳)</div>
        <div class="text" id="resultText"><span class="placeholder">―</span></div>
      </div>

    </div>

    <div class="mic-area">
      <div class="wave-wrap">
        <canvas id="wave"></canvas>
      </div>
      <div class="mic-status" id="micStatus">マイク未使用(タップして許可)</div>
      <button class="mic-btn" id="micBtn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 14C13.66 14 15 12.66 15 11V5C15 3.34 13.66 2 12 2C10.34 2 9 3.34 9 5V11C9 12.66 10.34 14 12 14Z" fill="currentColor"/><path d="M17 11C17 13.76 14.76 16 12 16C9.24 16 7 13.76 7 11H5C5 14.53 7.61 17.43 11 17.92V21H13V17.92C16.39 17.43 19 14.53 19 11H17Z" fill="currentColor"/></svg>
      </button>
      <div class="home-indicator"></div>
    </div>

  </div>
</div>

<script>
/* =========================================================
   1) 翻訳フロー(ボタン → ベトナム語表示 → 翻訳中 → 日本語表示)
   ========================================================= */
const SOURCE_VI  = "Bọn chúng giết người không ghê tay.";
const RESULT_JA  = "あいつら平気で人を殺す。";

const startBtn    = document.getElementById('startBtn');
const sourceText  = document.getElementById('sourceText');
const resultText  = document.getElementById('resultText');
const recordedTag = document.getElementById('recordedTag');

function setCardText(el, html) {
  el.style.opacity = 0;
  el.style.transform = 'translateY(4px)';
  setTimeout(() => {
    el.innerHTML = html;
    el.style.opacity = 1;
    el.style.transform = 'translateY(0)';
  }, 180);
}

// 音声認識中のカーソル(点滅バー)
const CURSOR = '<span class="rec-cursor">|</span>';

// 単語を少しずつ追加して「喋りながら認識されている」演出を作る
function typeWords(el, fullText, totalDurationMs, onDone) {
  const words = fullText.split(' ');
  let i = 0;

  // 単語ごとの間隔を均等割り
  const interval = totalDurationMs / words.length;

  el.style.opacity = 1;
  el.style.transform = 'translateY(0)';
  el.innerHTML = CURSOR;

  const timer = setInterval(() => {
    i++;
    const partial = words.slice(0, i).join(' ');
    el.innerHTML = partial + CURSOR;

    if (i >= words.length) {
      clearInterval(timer);
      setTimeout(() => {
        el.innerHTML = fullText;
        if (onDone) onDone();
      }, 250);
    }
  }, interval);
}

startBtn.addEventListener('click', () => {
  startBtn.disabled = true;
  startBtn.textContent = '認識中...';

  recordedTag.style.display = 'none';
  setCardText(resultText, '<span class="placeholder">―</span>');
  sourceText.innerHTML = '';

  // ① ベトナム語を約4秒かけて単語ごとに表示(発話中の音声認識を再現)
  setTimeout(() => {
    typeWords(sourceText, SOURCE_VI, 4000, () => {
      recordedTag.style.display = 'inline-flex';
      startBtn.textContent = '翻訳中...';

      // ② 翻訳中表示(日本語カード側)
      setCardText(resultText, '<span class="translating-tag"><span class="spinner"></span>翻訳中…</span>');

      // ③ 約1秒後に日本語訳を表示
      setTimeout(() => {
        setCardText(resultText, RESULT_JA);
        startBtn.disabled = false;
        startBtn.textContent = '▶ 翻訳をスタート';
      }, 1000);
    });
  }, 300);
});

/* =========================================================
   2) 波形(実マイク入力 / Web Audio API)
   ========================================================= */
const canvas = document.getElementById('wave');
const ctx = canvas.getContext('2d');
const micBtn = document.getElementById('micBtn');
const micStatus = document.getElementById('micStatus');

let audioCtx, analyser, dataArray, source, stream;
let micActive = false;

const BAR_COUNT = 46;
let bars = new Array(BAR_COUNT).fill(0.08);

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
resize();
window.addEventListener('resize', resize);

async function startMic() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.75;
    source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    micActive = true;
    micBtn.classList.add('active');
    micStatus.textContent = 'マイク入力中(現場音声)';
    micStatus.classList.add('live');
  } catch (err) {
    micStatus.textContent = 'マイクへのアクセスが許可されませんでした';
    console.error(err);
  }
}

function stopMic() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  micActive = false;
  micBtn.classList.remove('active');
  micStatus.textContent = 'マイク未使用(タップして許可)';
  micStatus.classList.remove('live');
}

micBtn.addEventListener('click', () => {
  if (micActive) stopMic();
  else startMic();
});

function drawIdle() {
  for (let i=0;i<BAR_COUNT;i++){
    bars[i] += (Math.random()-0.5) * 0.04;
    bars[i] = Math.max(0.06, Math.min(0.18, bars[i]));
  }
}

function drawFromMic() {
  analyser.getByteFrequencyData(dataArray);
  const step = Math.floor(dataArray.length / BAR_COUNT);
  for (let i=0; i<BAR_COUNT; i++) {
    let sum = 0;
    for (let j=0; j<step; j++) sum += dataArray[i*step + j];
    const avg = sum / step / 255;
    const target = Math.max(0.06, Math.min(1, avg * 1.6));
    bars[i] += (target - bars[i]) * 0.45;
  }
}

function render() {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.clearRect(0,0,w,h);

  if (micActive) drawFromMic();
  else drawIdle();

  const gap = 3.2;
  const barWidth = (w - gap*(BAR_COUNT-1)) / BAR_COUNT;

  for (let i=0; i<BAR_COUNT; i++) {
    const amp = bars[i];
    const barH = h * 0.12 + amp * h * 0.8;
    const x = i * (barWidth + gap);
    const y = (h - barH) / 2;

    const grad = ctx.createLinearGradient(0,y,0,y+barH);
    if (micActive) {
      grad.addColorStop(0, '#ff6b5e');
      grad.addColorStop(1, '#ff453a');
    } else {
      grad.addColorStop(0, '#48484a');
      grad.addColorStop(1, '#3a3a3c');
    }
    ctx.fillStyle = grad;

    ctx.beginPath();
    ctx.roundRect(x, y, barWidth, barH, barWidth/2);
    ctx.fill();
  }

  requestAnimationFrame(render);
}
render();
</script>

</body>
</html>
